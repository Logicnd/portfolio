<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Code Runner — Kiri</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root { --editor-bg:#0b0d10; --editor-fg:#c9d1d9; --muted:#8b949e; }
    .runner { max-width:1100px; margin:1.5rem auto; }
    .toolbar { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.75rem; }
    .btn { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.45rem 0.7rem; border-radius:6px; cursor:pointer; }
    .btn.secondary { background:transparent; color:var(--text-muted); }
    .split { display:grid; grid-template-columns:1fr 420px; gap:0.75rem; }
    .editors { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.5rem; display:flex; flex-direction:column; gap:0.5rem; }
    .tabs { display:flex; gap:0.5rem; }
    .tab { padding:0.35rem 0.6rem; border-radius:6px; background:transparent; color:var(--text-muted); cursor:pointer; border:1px solid transparent; }
    .tab.active { background:var(--bg); color:var(--text); border-color:var(--border); }
    textarea.code { width:100%; height:220px; background:var(--editor-bg); color:var(--editor-fg); border:1px solid var(--border); padding:0.6rem; border-radius:6px; font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, monospace; font-size:0.9rem; resize:vertical; }
    .preview { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; display:flex; flex-direction:column; }
    .preview-toolbar { padding:0.5rem; border-bottom:1px solid var(--border); display:flex; gap:0.5rem; align-items:center; }
    .preview-iframe { flex:1; border:0; width:100%; height:360px; background:white; }
    .console { font-family:ui-monospace, monospace; font-size:0.85rem; color:var(--text); background:#07080a; padding:0.6rem; height:120px; overflow:auto; border-top:1px solid var(--border); }
    .small { color:var(--text-muted); font-size:0.9rem; }
    @media (max-width:900px) { .split { grid-template-columns:1fr; } .preview-iframe{height:260px;} }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <a href="../index.html" class="brand-link" aria-label="Kiri home">
        <span class="wordmark">kiri<span class="accent-dot" aria-hidden="true"></span></span>
      </a>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1>Code Runner</h1>
      <p class="tagline">In-browser playground: HTML / CSS / JS preview with console capture.</p>
    </section>

    <div class="runner">
      <div class="toolbar">
        <button id="runBtn" class="btn">Run</button>
        <button id="resetBtn" class="btn secondary">Reset</button>
        <button id="saveBtn" class="btn secondary">Save</button>
        <button id="downloadBtn" class="btn secondary">Download</button>
        <div style="flex:1"></div>
        <span class="small">Tip: your code runs locally in an iframe sandbox.</span>
      </div>

      <div class="split">
        <div class="editors">
          <div class="tabs">
            <button class="tab active" data-tab="html">HTML</button>
            <button class="tab" data-tab="css">CSS</button>
            <button class="tab" data-tab="js">JS</button>
          </div>
          <div class="editor-area">
            <textarea id="html" class="code"></textarea>
            <textarea id="css" class="code" style="display:none"></textarea>
            <textarea id="js" class="code" style="display:none"></textarea>
          </div>
        </div>

        <div class="preview">
          <div class="preview-toolbar">
            <strong class="small">Preview</strong>
          </div>
          <iframe id="preview" class="preview-iframe" sandbox="allow-scripts"></iframe>
          <div id="console" class="console"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Kiri</p>
  </footer>

  <script>
    const defaultHTML = `<!doctype html>\n<html><body>\n<h2 style="font-family:system-ui">Hello from Code Runner</h2>\n<p>Edit HTML, CSS, JS and hit Run.</p>\n</body></html>`;
    const defaultCSS = `body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color:#111; padding:1rem } h2{color:#0b64ff}`;
    const defaultJS = `console.log('Welcome to Code Runner');`;

    const htmlEl = document.getElementById('html');
    const cssEl = document.getElementById('css');
    const jsEl = document.getElementById('js');
    const preview = document.getElementById('preview');
    const consoleEl = document.getElementById('console');

    function loadSaved(){
      htmlEl.value = localStorage.getItem('cr:html') || defaultHTML;
      cssEl.value = localStorage.getItem('cr:css') || defaultCSS;
      jsEl.value = localStorage.getItem('cr:js') || defaultJS;
    }

    function buildSrcDoc(){
      return `<!doctype html><html><head><meta charset="utf-8"><style>${cssEl.value}</style></head><body>${htmlEl.value}<script>\n// hook console to parent\n(function(){
        const send = (type,args)=>parent.postMessage({__CR:true,type,args},'*');
        ['log','warn','error','info','debug'].forEach(fn=>{
          const orig = console[fn];
          console[fn]=function(){ send(fn,Array.from(arguments)); orig.apply(console,arguments); }
        });
      })();\ntry{\n${jsEl.value}\n}catch(e){console.error(e)}<\/script></body></html>`;
    }

    window.addEventListener('message', (ev)=>{
      if(!ev.data || !ev.data.__CR) return;
      const {type,args} = ev.data;
      const entry = document.createElement('div');
      entry.textContent = `[${type}] ${args.map(a=>{try{return JSON.stringify(a)}catch(e){return String(a)}}).join(' ' )}`;
      consoleEl.appendChild(entry);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    });

    document.getElementById('runBtn').addEventListener('click', ()=>{
      consoleEl.textContent='';
      const src = buildSrcDoc();
      preview.srcdoc = src;
    });

    document.getElementById('resetBtn').addEventListener('click', ()=>{ if(confirm('Reset editor to defaults?')){ htmlEl.value=defaultHTML; cssEl.value=defaultCSS; jsEl.value=defaultJS; localStorage.removeItem('cr:html'); localStorage.removeItem('cr:css'); localStorage.removeItem('cr:js'); } });

    document.getElementById('saveBtn').addEventListener('click', ()=>{
      localStorage.setItem('cr:html', htmlEl.value);
      localStorage.setItem('cr:css', cssEl.value);
      localStorage.setItem('cr:js', jsEl.value);
      alert('Saved to localStorage');
    });

    document.getElementById('downloadBtn').addEventListener('click', ()=>{
      const a = document.createElement('a');
      const blob = new Blob([buildSrcDoc()], {type:'text/html'});
      a.href = URL.createObjectURL(blob);
      a.download = 'code-runner.html';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // tabs
    document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      htmlEl.style.display = (tab==='html')?'block':'none';
      cssEl.style.display = (tab==='css')?'block':'none';
      jsEl.style.display = (tab==='js')?'block':'none';
    }));

    // init
    loadSaved();
    // run once to show preview
    document.getElementById('runBtn').click();
  </script>
</body>
</html>
