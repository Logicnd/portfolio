<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiri</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header topbar">
    <div class="brand">
      <a href="index.html" class="brand-link" aria-label="Kiri home">
        <span class="wordmark">kiri<span class="accent-dot" aria-hidden="true"></span></span>
      </a>
    </div>
    <nav class="topnav" aria-hidden="true"></nav>
    <button class="hamburger">☰</button>
  </header>

  <div id="mobileDrawer" class="mobile-drawer" aria-hidden="true">
    <div class="drawer-inner">
      <button class="drawer-close">Close</button>
      <nav style="margin-top:1rem; display:flex; flex-direction:column; gap:0.75rem;">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="roblox.html">Roblox Games</a>
        <a href="github-projects.html">GitHub Projects</a>
        <a href="mini-tools.html">Mini Tools</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </div>

  <main class="main">
    <section class="hero">
      <h1>Hey, I'm <strong>Kiri</strong></h1>
      <p class="tagline">Developer &amp; Creator</p>
    </section>

    <section class="card">
      <h2>Quick links</h2>
      <nav class="links">
        <a href="https://www.roblox.com/users/1266112836/profile" class="link-item" target="_blank" rel="noopener">
          <img src="img/roblox.svg" alt="Roblox profile" class="link-icon">
          <span>Roblox</span>
        </a>
        <a href="https://github.com/Logicnd" class="link-item" target="_blank" rel="noopener">
          <img src="img/github.svg" alt="GitHub" class="link-icon">
          <span>GitHub</span>
        </a>
        <a href="projects.html" class="link-item">
          <img src="img/projects.svg" alt="Projects" class="link-icon">
          <span>Projects</span>
        </a>
      </nav>
    </section>

    <section class="card">
      <h2>Music</h2>
      <p class="small">Play a playlist while you browse. Replace the placeholder playlist ID with your own.</p>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <button id="spotifyToggleBtn" class="btn">Play music</button>
        <span id="spotifyMsg" class="small"></span>
      </div>
      <div id="spotifyContainer" style="margin-top:0.75rem;display:none;max-width:660px;">
        <!-- Replace YOUR_PLAYLIST_ID with your Spotify playlist or track id -->
        <iframe id="spotifyIframe" style="border-radius:12px" src="" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>&copy; 2026 Kiri</p>
  </footer>

</body>
</html>
